<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solidgate Payment Form Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 {
        font-size: 24px;
      }
      label {
        display: block;
        margin: 8px 0 4px;
        font-weight: 500;
      }
      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        padding: 10px 24px;
        background: #0066ff;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #0052cc;
      }
      #payment-form {
        margin-top: 24px;
        min-height: 300px;
      }
      #status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 4px;
        display: none;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      .info {
        background: #d1ecf1;
        color: #0c5460;
      }
    </style>
  </head>
  <body>
    <h1>Solidgate Payment Form Test</h1>

    <form id="config-form">
      <label
        >Amount (cents): <input id="amount" value="1020" type="number"
      /></label>
      <label>Currency: <input id="currency" value="USD" /></label>
      <label
        >Description: <input id="description" value="Test payment"
      /></label>
      <button type="submit">Initialize Payment Form</button>
    </form>

    <div id="status"></div>
    <div id="payment-form"></div>

    <script src="https://cdn.solidgate.com/js/solid-form.js"></script>
    <script>
      const statusEl = document.getElementById("status");

      function showStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = type;
        statusEl.style.display = "block";
      }

      document
        .getElementById("config-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          showStatus("Initializing payment form...", "info");

          const orderId = "order-" + crypto.randomUUID();

          try {
            // Fetch merchantData from backend
            const resp = await fetch("/api/payment-intent", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                amount: parseInt(document.getElementById("amount").value),
                currency: document.getElementById("currency").value,
                order_id: orderId,
                order_description: document.getElementById("description").value,
              }),
            });

            if (!resp.ok) {
              const err = await resp.json();
              showStatus("Error: " + (err.error || resp.statusText), "error");
              return;
            }

            const merchantData = await resp.json();

            // Clear previous form
            document.getElementById("payment-form").innerHTML = "";

            // Initialize Solidgate Payment Form
            const form = PaymentFormSdk.init({
              merchantData,
              iframeParams: { containerId: "payment-form" },
            });

            form.on("mounted", () => {
              showStatus(
                "Payment form loaded. Use test card: 4067429974719265",
                "info",
              );
            });

            form.on("submit", () => {
              showStatus("Processing payment...", "info");
            });

            form.on("success", (event) => {
              showStatus("Payment successful! Order: " + orderId, "success");
              console.log("Success event:", event);
            });

            form.on("fail", (event) => {
              const msg = event.error?.message || "Payment declined";
              showStatus("Payment failed: " + msg, "error");
              console.log("Fail event:", event);
            });

            form.on("error", (event) => {
              showStatus(
                "Error: " + (event.value?.message || "Unknown error"),
                "error",
              );
              console.error("Error event:", event);
            });

            form.on("verify", () => {
              showStatus("3DS verification in progress...", "info");
            });

            form.on("card", (event) => {
              console.log("Card detected:", event.card);
            });
          } catch (err) {
            showStatus("Network error: " + err.message, "error");
          }
        });
    </script>
  </body>
</html>
